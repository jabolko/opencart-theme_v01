<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Radio Buttons — 5 Designs</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #f9b94a;
    --gold-dark: #e0a030;
    --charcoal: #565656;
    --heading: #2b2e35;
    --muted: #9aa0af;
    --surface: #ffffff;
    --surface-alt: #f7f7f7;
    --border: #d6d9e0;
    --success: #7d9478;
    --font-heading: 'Open Sans', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  body { font-family: var(--font-body); color: var(--charcoal); background: var(--surface-alt); padding: 16px; font-size: 15px; line-height: 1.5; }

  .version-nav { position: sticky; top: 0; z-index: 100; background: #3a3a3a; padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: -16px -16px 16px; }
  .version-nav span { color: #fff; font-family: var(--font-heading); font-weight: 600; font-size: 14px; margin-right: 8px; }
  .version-nav button { padding: 6px 16px; border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; background: transparent; color: #fff; font-family: var(--font-body); font-size: 13px; cursor: pointer; }
  .version-nav button.active, .version-nav button:hover { background: var(--gold); color: var(--heading); border-color: var(--gold); }
  .version { display: none; max-width: 420px; margin: 0 auto; }
  .version.active { display: block; }
  .version h3 { font-family: var(--font-heading); font-size: 14px; color: var(--heading); margin-bottom: 12px; }

  .card { background: #fff; border-radius: 12px; padding: 20px 16px; margin-bottom: 16px; }
  .card-title { font-family: var(--font-heading); font-size: 15px; font-weight: 600; color: var(--heading); margin-bottom: 14px; }
  .btn { width: 100%; padding: 14px; background: var(--gold); color: var(--heading); border: none; border-radius: 12px; font-family: var(--font-heading); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px; }

  /* ── Shared radio base ── */
  .radios { display: flex; flex-direction: column; gap: 8px; }
  .radios input[type="radio"] { display: none; }
  .radios input[type="checkbox"] { display: none; }

  /* ════════════════════════════════════════
     V1 — BORDERED CARDS
     ════════════════════════════════════════ */
  .v1-radio { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s; }
  .v1-radio:hover { border-color: var(--gold); }
  input:checked + .v1-radio { border-color: var(--gold); background: #fffbf0; }
  .v1-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  input:checked + .v1-radio .v1-dot { border-color: var(--gold); }
  input:checked + .v1-radio .v1-dot::after { content: ''; width: 10px; height: 10px; border-radius: 50%; background: var(--gold); }
  .v1-text { flex: 1; }
  .v1-title { font-size: 14px; font-weight: 500; color: var(--heading); font-family: var(--font-heading); }
  .v1-desc { font-size: 12px; color: var(--muted); }
  .v1-price { font-size: 14px; font-weight: 600; color: var(--heading); font-family: var(--font-heading); white-space: nowrap; }
  .v1-price--free { color: var(--success); }

  /* Checkbox variant */
  .v1-check { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; font-size: 13px; color: var(--charcoal); cursor: pointer; }
  .v1-box { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all 0.2s; }
  input:checked + .v1-check .v1-box { background: var(--gold); border-color: var(--gold); }
  input:checked + .v1-check .v1-box::after { content: ''; width: 5px; height: 9px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); margin-top: -2px; }

  /* ════════════════════════════════════════
     V2 — PILL CHIPS (inline, compact)
     ════════════════════════════════════════ */
  .v2-radios { display: flex; flex-direction: column; gap: 6px; }
  .v2-radio { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--surface-alt); border-radius: 8px; cursor: pointer; transition: all 0.2s; border: 1.5px solid transparent; }
  .v2-radio:hover { background: #f0f0f0; }
  input:checked + .v2-radio { background: #fffbf0; border-color: var(--gold); }
  .v2-left { display: flex; align-items: center; gap: 10px; }
  .v2-icon { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; position: relative; }
  input:checked + .v2-radio .v2-icon { border-color: var(--gold); background: var(--gold); }
  input:checked + .v2-radio .v2-icon::after { content: ''; position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border-radius: 50%; background: #fff; transform: translate(-50%, -50%); }
  .v2-label { font-size: 14px; color: var(--heading); font-weight: 500; font-family: var(--font-heading); }
  .v2-sub { font-size: 11px; color: var(--muted); }
  .v2-price { font-size: 13px; font-weight: 600; color: var(--heading); font-family: var(--font-heading); }
  .v2-price--free { color: var(--success); }

  .v2-check { display: flex; align-items: center; gap: 10px; padding: 10px 0; font-size: 13px; color: var(--charcoal); cursor: pointer; }
  .v2-checkbox { width: 18px; height: 18px; border-radius: 6px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  input:checked + .v2-check .v2-checkbox { background: var(--gold); border-color: var(--gold); }
  input:checked + .v2-check .v2-checkbox::after { content: ''; width: 5px; height: 9px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); margin-top: -2px; }

  /* ════════════════════════════════════════
     V3 — UNDERLINE MINIMAL (no borders, just lines)
     ════════════════════════════════════════ */
  .v3-radio { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid #eee; cursor: pointer; transition: all 0.2s; }
  .v3-radio:last-of-type { border-bottom: none; }
  input:checked + .v3-radio { background: transparent; }
  .v3-circle { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; position: relative; transition: all 0.2s; }
  input:checked + .v3-radio .v3-circle { border-color: var(--gold); border-width: 5px; }
  .v3-info { flex: 1; }
  .v3-name { font-size: 14px; color: var(--heading); font-weight: 500; font-family: var(--font-heading); }
  .v3-meta { font-size: 12px; color: var(--muted); }
  .v3-cost { font-size: 14px; font-weight: 600; color: var(--heading); font-family: var(--font-heading); }
  .v3-cost--free { color: var(--success); }

  .v3-check { display: flex; align-items: center; gap: 10px; padding: 12px 0; font-size: 13px; color: var(--charcoal); cursor: pointer; }
  .v3-tick { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  input:checked + .v3-check .v3-tick { background: var(--heading); border-color: var(--heading); }
  input:checked + .v3-check .v3-tick::after { content: ''; width: 5px; height: 9px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); margin-top: -2px; }

  /* ════════════════════════════════════════
     V4 — FULL-WIDTH HIGHLIGHT (selected = gold left bar)
     ════════════════════════════════════════ */
  .v4-radio { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; background: var(--surface-alt); margin-bottom: 4px; }
  input:checked + .v4-radio { border-left-color: var(--gold); background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .v4-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; }
  input:checked + .v4-radio .v4-dot { border-color: var(--gold); background: var(--gold); box-shadow: inset 0 0 0 3px #fff; }
  .v4-content { flex: 1; }
  .v4-title { font-size: 14px; font-weight: 500; color: var(--heading); font-family: var(--font-heading); }
  .v4-subtitle { font-size: 11px; color: var(--muted); }
  .v4-amount { font-size: 14px; font-weight: 600; color: var(--heading); font-family: var(--font-heading); }
  .v4-amount--free { color: var(--success); }

  .v4-check { display: flex; align-items: center; gap: 10px; padding: 12px 0; font-size: 13px; color: var(--charcoal); cursor: pointer; }
  .v4-square { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  input:checked + .v4-check .v4-square { background: var(--gold); border-color: var(--gold); }
  input:checked + .v4-check .v4-square::after { content: ''; width: 5px; height: 9px; border: solid var(--heading); border-width: 0 2px 2px 0; transform: rotate(45deg); margin-top: -2px; }

  /* ════════════════════════════════════════
     V5 — COMPACT LIST (tight, icon-led)
     ════════════════════════════════════════ */
  .v5-radio { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.15s; margin-bottom: 6px; }
  input:checked + .v5-radio { border-color: var(--gold); }
  .v5-check-mark { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  input:checked + .v5-radio .v5-check-mark { background: var(--gold); border-color: var(--gold); }
  input:checked + .v5-radio .v5-check-mark::after { content: ''; width: 5px; height: 8px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); margin-top: -1px; }
  .v5-body { flex: 1; display: flex; justify-content: space-between; align-items: center; }
  .v5-name { font-size: 13px; color: var(--heading); font-weight: 500; font-family: var(--font-heading); }
  .v5-detail { font-size: 11px; color: var(--muted); }
  .v5-tag { font-size: 12px; font-weight: 600; color: var(--heading); font-family: var(--font-heading); }
  .v5-tag--free { color: var(--success); font-size: 11px; background: #f0f7ee; padding: 2px 8px; border-radius: 4px; }

  .v5-check { display: flex; align-items: center; gap: 8px; padding: 10px 0; font-size: 13px; color: var(--charcoal); cursor: pointer; }
  .v5-sq { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  input:checked + .v5-check .v5-sq { background: var(--heading); border-color: var(--heading); }
  input:checked + .v5-check .v5-sq::after { content: ''; width: 4px; height: 8px; border: solid #fff; border-width: 0 1.5px 1.5px 0; transform: rotate(45deg); margin-top: -1px; }
</style>
</head>

<script>
function show(n) {
  document.querySelectorAll('.version').forEach(function(v) { v.classList.remove('active'); });
  document.querySelectorAll('.version-nav button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('v' + n).classList.add('active');
  document.querySelectorAll('.version-nav button')[n - 1].classList.add('active');
  window.scrollTo(0, 0);
}
